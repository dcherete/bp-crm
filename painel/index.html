async function renderUnsubscribes(){
  const el=document.getElementById('content');
  el.innerHTML=loader();
  document.getElementById('page-actions').innerHTML=`
    <button class="btn btn-primary" onclick="openAddUnsub()">+ Adicionar Descadastro</button>`;

  // Load from API + local storage
  let subs=[];
  try{subs=(await api.get('/v1/subscribers?limit=200&page=0')).data||[];}catch(e){}
  const unsubs=getUnsubs();

  // Merge: local unsubs + try to detect subscribers with no channels
  const rows_api=subs.filter(s=>!s.channels?.length&&!s.email).map(s=>({
    subscriberId:s.subscriberId, email:s.email||'—', name:[s.firstName,s.lastName].filter(Boolean).join(' ')||'—',
    channels:[], source:'auto', date:s.updatedAt
  }));
  const rows_manual=unsubs.map(u=>({...u,source:'manual'}));
  const all=[...rows_manual,...rows_api].filter((v,i,a)=>a.findIndex(t=>t.subscriberId===v.subscriberId)===i);

  if(!all.length){
    el.innerHTML=emptyState(`<svg class="empty-ico" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="14" r="8" stroke="currentColor" stroke-width="2"/><path d="M6 38c0-8.8 7.2-16 16-16s16 7.2 16 16" stroke="currentColor" stroke-width="2"/><path d="M28 30l8 8M36 30l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,'Nenhum descadastro','Subscribers que pedem para parar de receber notificações aparecem aqui.');
    return;
  }

  const tableRows=all.map(u=>`<tr>
    <td><span style="font-weight:600">${u.name||'—'}</span></td>
    <td>${u.email||'—'}</td>
    <td><code style="font-size:11px">${u.subscriberId||'—'}</code></td>
    <td>${u.channels?.map(c=>chTag(c)).join(' ')||'<span class="tag tg-red">Todos</span>'}</td>
    <td>${u.source==='manual'?'<span class="tag tg-yellow">Manual</span>':'<span class="tag tg-gray">Detectado</span>'}</td>
    <td class="text-muted text-sm">${fdate(u.date)}</td>
    <td><button class="btn btn-green btn-sm" onclick="doResubscribe('${u.subscriberId}')">Reativar</button></td>
  </tr>`).join('');

  el.innerHTML=`
    <div style="padding:10px 14px;background:var(--yel-lt);border:1px solid var(--yel-bd);border-radius:10px;font-size:12px;color:var(--yellow);margin-bottom:16px">
      <strong>Atenção:</strong> Subscribers descadastrados são excluídos automaticamente dos disparos de campanhas.
    </div>
    <div class="card"><div class="tbl-wrap"><table>
      <thead><tr><th>Nome</th><th>Email</th><th>ID</th><th>Canais bloqueados</th><th>Origem</th><th>Data</th><th></th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div></div>`;
}

         <label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-left:4px"><input type="checkbox" id="u-all-ch" style="accent-color:var(--red)" onchange="if(this.checked){document.getElementById('u-email-ch').checked=true;document.getElementById('u-push-ch').checked=true;}"> Todos</label>
       </div>
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="doAddUnsub()">Registrar</button>`
  );
}

async function doAddUnsub(){
  const val=document.getElementById('u-email')?.value?.trim();
  if(!val){toast('Informe o email ou ID','err');return;}
  const channels=[];
  if(document.getElementById('u-email-ch')?.checked)channels.push('email');
  if(document.getElementById('u-push-ch')?.checked)channels.push('push');

  // try to find subscriber
  let sub=null;
  try{
    const r=await api.get(`/v1/subscribers?limit=100&page=0`);
    sub=(r.data||[]).find(s=>s.email===val||s.subscriberId===val);
  }catch(e){}

  const entry={subscriberId:sub?.subscriberId||val,email:sub?.email||val,name:[sub?.firstName,sub?.lastName].filter(Boolean).join(' ')||'—',channels,date:new Date().toISOString()};
  const unsubs=getUnsubs();
  const existing=unsubs.findIndex(u=>u.subscriberId===entry.subscriberId);
  if(existing>=0) unsubs[existing]=entry; else unsubs.push(entry);
  saveUnsubs(unsubs);

  // update badge
  const badge=document.getElementById('badge-unsub');
  if(badge){badge.style.display='';badge.textContent=unsubs.length;}

  // try to update Novu preferences
  if(sub){
    try{
      const prefChannels={};
      if(channels.length===0||channels.includes('email'))prefChannels.email=false;
      if(channels.length===0||channels.includes('push'))prefChannels.push=false;
      await api.patch(`/v1/subscribers/${sub.subscriberId}/preferences`,{channels:prefChannels});
    }catch(e){}
  }

  toast('Descadastro registrado!','ok'); closeModal(); renderUnsubscribes();
}

async function doResubscribe(subscriberId){
  if(!confirm('Reativar este subscriber?'))return;
  const unsubs=getUnsubs().filter(u=>u.subscriberId!==subscriberId);
  saveUnsubs(unsubs);
  const badge=document.getElementById('badge-unsub');
  if(badge){if(unsubs.length===0)badge.style.display='none';else badge.textContent=unsubs.length;}
  try{await api.patch(`/v1/subscribers/${subscriberId}/preferences`,{channels:{email:true,push:true}});}catch(e){}
  toast('Subscriber reativado!','ok'); renderUnsubscribes();
}

function getSupp(){return JSON.parse(localStorage.getItem('crm-supp')||'[]');}

function openAddSupp(){
  openModal('Adicionar à Lista de Supressão',
    `<div class="form-group"><label>Email <span style="color:var(--red)">*</span></label><input class="form-control" id="sp-email" type="email" placeholder="email@exemplo.com"></div>
     <div class="form-group"><label>Motivo <span class="text-muted text-sm">(opcional)</span></label>
       <select class="form-control" id="sp-reason"><option value="">Selecione...</option><option>Bounce permanente</option><option>Spam complaint</option><option>Pedido de descadastro</option><option>Email inválido</option><option>Outro</option></select>
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="doAddSupp()">Adicionar</button>`
  );
  setTimeout(()=>document.getElementById('sp-email')?.focus(),100);
}

function doAddSupp(){
  const email=document.getElementById('sp-email')?.value?.trim();
  if(!email||!email.includes('@')){toast('Email inválido','err');return;}
  const reason=document.getElementById('sp-reason')?.value;
  const supp=getSupp();
  if(supp.some(s=>s.email===email)){toast('Email já está na lista','err');return;}
  supp.push({email,reason,date:new Date().toISOString()});
  saveSupp(supp); toast('Email adicionado à supressão!','ok'); closeModal(); renderSuppression();
}

function removeSupp(email){
  if(!confirm(`Remover "${email}" da supressão?`))return;
  saveSupp(getSupp().filter(s=>s.email!==email)); toast('Removido da supressão','ok'); renderSuppression();
}

function clearAllSupp(){
  if(!confirm(`Limpar toda a lista de supressão (${getSupp().length} emails)?`))return;
  saveSupp([]); toast('Lista de supressão limpa','ok'); renderSuppression();
}

let _jd={steps:[]};

function openNewJornada(){
  _jd={steps:[]};
  showJornadaStep1();
}

async function showJornadaStep1(){
  let workflows=[];
  try{const r=await api.get('/v2/workflows?limit=50&status[]=ACTIVE&status[]=INACTIVE').catch(()=>api.get('/v1/workflows?limit=50'));workflows=r.data?.workflows||r.workflows||r.data||[];}catch(e){}
  _jd.availableWf=workflows;
  const wfOpts=workflows.length
    ?`<option value="">Selecione um existente...</option>`+workflows.map(w=>`<option value="${w.workflowId||w.identifier||w._id}">${w.name}</option>`).join('')
    :`<option value="">— Crie um workflow primeiro —</option>`;

  openModal('Nova Jornada',
    `${jornWizHdr(1)}
     <div class="form-group"><label>Nome da jornada <span style="color:var(--red)">*</span></label><input class="form-control" id="jn-name" placeholder="Ex: Ativação — Visitou Planos 3x"></div>
     <div class="form-group"><label>Evento do PostHog que dispara esta jornada <span style="color:var(--red)">*</span></label>
       <input class="form-control" id="jn-event" placeholder="Ex: visited_pricing_3x, video_watched_70pct">
       <div class="form-hint">Nome exato do evento configurado no PostHog (Data Management → Actions). Pode ser qualquer evento rastreado.</div>
     </div>
     <div class="divider"></div>
     <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--muted)">Workflow Novu (opcional — pule para usar o construtor de passos)</div>
     <div class="form-group" style="margin-bottom:0"><label>Usar workflow existente</label>
       <select class="form-control" id="jn-wf">${wfOpts}</select>
       <div class="form-hint">Se selecionar um workflow, ele será usado diretamente. Deixe em branco para construir os passos abaixo.</div>
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="jornNext1()">Próximo →</button>`,
    true
  );
  setTimeout(()=>document.getElementById('jn-name')?.focus(),100);
}

function jornNext1(){
  _jd.name=document.getElementById('jn-name')?.value?.trim();
  _jd.phEvent=document.getElementById('jn-event')?.value?.trim();
  _jd.workflowId=document.getElementById('jn-wf')?.value||'';
  if(!_jd.name){toast('Nome é obrigatório','err');return;}
  if(!_jd.phEvent){toast('Informe o evento do PostHog','err');return;}
  if(_jd.workflowId){
    // skip step builder, go to confirm
    showJornadaConfirm();
  } else {
    showJornadaStepBuilder();
  }
}

function showJornadaStepBuilder(){
  renderStepBuilderModal();
}

function renderStepBuilderModal(){
  const stepsHtml=_jd.steps.map((s,i)=>renderStepItem(s,i)).join('');

         <button class="btn btn-secondary btn-sm" onclick="addStep('email')">📧 Email</button>

function renderStepItem(s,i){
  const icons={email:'📧',push:'🔔','push-cond':'🔔',delay:'⏱'};
  const labels={email:'Email',push:'Push',delay:'Aguardar','push-cond':'Push condicional'};
  let fields='';
  if(s.type==='email'){
    fields=`
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0"><label style="font-size:11px">Assunto</label><input class="form-control" value="${s.subject||''}" oninput="_jd.steps[${i}].subject=this.value" placeholder="Olá {{firstName}}!"></div>
        <div class="form-group" style="margin-bottom:0"><label style="font-size:11px">Workflow ID</label><input class="form-control" value="${s.workflowId||_jd.workflowId||''}" oninput="_jd.steps[${i}].workflowId=this.value" placeholder="id-do-workflow-email"></div>
      </div>`;
  } else if(s.type==='push'||s.type==='push-cond'){
    fields=`
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0"><label style="font-size:11px">Título</label><input class="form-control" value="${s.title||''}" oninput="_jd.steps[${i}].title=this.value" placeholder="Nova mensagem para você"></div>
        <div class="form-group" style="margin-bottom:0"><label style="font-size:11px">Workflow ID</label><input class="form-control" value="${s.workflowId||''}" oninput="_jd.steps[${i}].workflowId=this.value" placeholder="id-do-workflow-push"></div>
      </div>
      ${s.type==='push-cond'?`<p style="font-size:11px;color:var(--purple);margin-top:6px">⚡ Este push só será enviado se o email anterior não foi aberto.</p>`:''}`;
  } else if(s.type==='delay'){
    fields=`
      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" class="form-control" style="width:80px" value="${s.amount||1}" min="1" oninput="_jd.steps[${i}].amount=parseInt(this.value)||1">
        <select class="form-control" style="width:120px" onchange="_jd.steps[${i}].unit=this.value">
          <option value="minutos" ${s.unit==='minutos'?'selected':''}>minutos</option>
          <option value="horas" ${s.unit==='horas'?'selected':''}>horas</option>
          <option value="dias" ${(!s.unit||s.unit==='dias')?'selected':''}>dias</option>
        </select>
        <span style="font-size:12px;color:var(--muted)">de espera antes do próximo passo</span>
      </div>`;
  }
  return `<div class="step-item" id="step-${i}">
    <div class="step-item-hd">
      <div class="step-num">${i+1}</div>
      <div class="step-type">${icons[s.type]||''} ${labels[s.type]||s.type}</div>
      <button class="step-remove" onclick="removeStep(${i})" title="Remover passo">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
    ${fields}
  </div>${i<_jd.steps.length-1?'<div class="step-conn">↓</div>':''}`;
}

function addStep(type){
  const defaults={email:{type:'email',subject:'',workflowId:''},push:{type:'push',title:'',workflowId:''},'push-cond':{type:'push-cond',title:'',workflowId:'',condition:'email_not_seen'},delay:{type:'delay',amount:2,unit:'dias'}};
  _jd.steps.push({...defaults[type]||{type}});
  renderStepBuilderModal();
}

function removeStep(i){
  _jd.steps.splice(i,1);
  renderStepBuilderModal();
}

function jornNext2(){
  if(!_jd.steps.length){toast('Adicione ao menos um passo','err');return;}
  showJornadaConfirm();
}

       ${_jd.workflowId?`<div style="display:flex;gap:8px"><span style="font-size:11px;font-weight:600;color:var(--muted);width:30%">Workflow</span><code>${_jd.workflowId}</code></div>`:''}
     </div></div>
     ${_jd.steps.length?`<div style="font-size:12px;font-weight:700;margin-bottom:6px">Sequência de passos</div>${stepSummary}`:''}
     ${warnNoWf}
     <div style="padding:10px 12px;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.18);border-radius:8px;font-size:11px;color:#7C3AED;margin-top:10px">
       <strong>Próximo passo:</strong> Após salvar, clique em "Webhook PostHog" para obter a URL e configurar no PostHog Actions.
     </div>`,
    `<button class="btn btn-secondary" onclick="${_jd.workflowId?'showJornadaStep1()':'showJornadaStepBuilder()'}">← Voltar</button><button class="btn btn-primary" onclick="doSaveJornada()">Salvar Jornada</button>`,
    true
  );
}

function jornWizHdr(active){
  const steps=_jd.workflowId?[['1','Configuração'],['2','Confirmar']]:[['1','Configuração'],['2','Passos'],['3','Confirmar']];
  return`<div class="wizard-steps">${steps.map(([n,l],i)=>{const c=i+1<active?'done':i+1===active?'active':'';return`${i>0?'<div class="wline"></div>':''}<div class="wstep ${c}">${i+1<active?'<div class="wnum">✓</div>':`<div class="wnum">${n}</div>`}<span>${l}</span></div>`;}).join('')}</div>`;
}

async function doSaveJornada(){
  const jornadas=getJornadas();
  const j={
    id:'jorn-'+Date.now(),
    name:_jd.name,
    phEvent:_jd.phEvent,
    workflowId:_jd.workflowId||(_jd.steps.find(s=>s.workflowId)?.workflowId)||'',
    steps:_jd.steps,
    status:'ativa',
    createdAt:new Date().toISOString()
  };
  jornadas.push(j);
  saveJornadas(jornadas);
  phCapture('jornada_created',{jornada_name:j.name,ph_event:j.phEvent,workflow:j.workflowId,steps:j.steps.length});
  toast('Jornada criada!','ok');
  closeModal();
  renderJornadas();
  // Show webhook config right away
  setTimeout(()=>showJornadaWebhook(jornadas.length-1),400);
}

function toggleJornada(idx,active){
  const j=getJornadas();
  if(!j[idx])return;
  j[idx].status=active?'ativa':'inativa';
  saveJornadas(j);
  phCapture(active?'jornada_activated':'jornada_paused',{jornada_name:j[idx].name,ph_event:j[idx].phEvent});
  toast(active?'Jornada ativada!':'Jornada pausada','ok');
  renderJornadas();
}

function deleteJornada(idx){
  const j=getJornadas();
  if(!confirm(`Remover jornada "${j[idx]?.name}"?`))return;
  j.splice(idx,1);
  saveJornadas(j);
  toast('Jornada removida','ok');
  renderJornadas();
}

async function testFireJornada(idx){
  const j=getJornadas()[idx];
  if(!j){toast('Jornada não encontrada','err');return;}
  if(!j.workflowId){toast('Esta jornada não tem um workflow Novu vinculado.','err');return;}

  // load subscribers for selection
  let subs=[];
  try{subs=(await api.get('/v1/subscribers?limit=100&page=0')).data||[];}catch(e){}
  const subOpts=subs.length
    ?subs.map(s=>`<option value="${s.subscriberId}">${[s.firstName,s.lastName].filter(Boolean).join(' ')||s.subscriberId} — ${s.email||''}</option>`).join('')
    :'<option value="">Nenhum subscriber encontrado</option>';

  openModal(`Testar Jornada: ${j.name}`,
    `<p class="text-sm text-muted" style="margin-bottom:14px">Dispara o workflow <code>${j.workflowId}</code> manualmente para um subscriber de teste, simulando o que aconteceria quando o PostHog enviasse o evento <code>${j.phEvent}</code>.</p>
     <div class="form-group"><label>Subscriber de teste <span style="color:var(--red)">*</span></label>
       <select class="form-control" id="tjn-sub">${subOpts}</select>
     </div>
     <div class="form-group"><label>Payload adicional <span class="text-muted text-sm">(JSON, opcional)</span></label>
       <textarea class="form-control" id="tjn-payload" placeholder='{"firstName": "João", "email": "joao@teste.com"}' style="font-family:monospace;font-size:12px;min-height:70px"></textarea>
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="doTestFireJornada('${j.workflowId}')">▷ Disparar Teste</button>`
  );
}

async function doTestFireJornada(workflowId){
  const subId=document.getElementById('tjn-sub')?.value;
  if(!subId){toast('Selecione um subscriber','err');return;}
  let payload={};
  const rawPayload=document.getElementById('tjn-payload')?.value?.trim();
  if(rawPayload){try{payload=JSON.parse(rawPayload);}catch(e){toast('JSON do payload inválido','err');return;}}
  try{
    await api.post('/v1/events/trigger',{name:workflowId,to:{subscriberId:subId},payload});
    phCapture('jornada_test_fired',{workflow:workflowId,subscriber_id:subId});
    toast('Teste disparado! Verifique o Feed de Atividade.','ok');
    closeModal();
  }catch(e){toast('Erro ao disparar: '+e.message,'err');}
}

function showJornadaWebhook(idx){
  const j=getJornadas()[idx];
  if(!j){toast('Jornada não encontrada','err');return;}
  const wfId=j.workflowId||'SEU_WORKFLOW_ID';
  const apiUrl=CFG.apiUrl;
  const apiKey=CFG.apiKey;

  const body=JSON.stringify({name:wfId,to:{subscriberId:'[person.distinct_id]'},payload:{firstName:'[person.properties.name]',email:'[person.properties.email]',event:'[event]'}},null,2);

  openModal(`Webhook PostHog — ${j.name}`,
    `<p class="text-sm text-muted" style="margin-bottom:16px">Configure este webhook no PostHog para que o evento <code>${j.phEvent}</code> dispare a jornada automaticamente.</p>
     <div class="ph-steps">
       <div class="ph-step">
         <div class="ph-step-num">1</div>
         <div class="ph-step-body">
           <div class="ph-step-title">Abrir PostHog → Data Management → Actions</div>
           <div class="ph-step-desc">Crie uma nova Action ou edite a existente que detecta o evento <code>${j.phEvent}</code>.</div>
         </div>
       </div>
       <div class="ph-step">
         <div class="ph-step-num">2</div>
         <div class="ph-step-body">
           <div class="ph-step-title">Adicionar Webhook como destino da Action</div>
           <div class="ph-step-desc">Na seção "Destinations", adicione um webhook com os dados abaixo.</div>
         </div>
       </div>
       <div class="ph-step">
         <div class="ph-step-num">3</div>
         <div class="ph-step-body">
           <div class="ph-step-title">URL e configuração do webhook</div>
           <div class="ph-step-desc" style="margin-bottom:8px"><strong>URL:</strong></div>
           <div class="webhook-box" style="margin-bottom:8px;padding:10px 12px;font-size:12px">
             ${apiUrl}/v1/events/trigger
             <button class="webhook-copy" onclick="copyText('${apiUrl}/v1/events/trigger')">Copiar</button>
           </div>
           <div class="ph-step-desc" style="margin-bottom:4px"><strong>Headers:</strong></div>
           <div class="webhook-box" style="margin-bottom:8px;font-size:11px">
             Authorization: ApiKey ${apiKey}<br>Content-Type: application/json
             <button class="webhook-copy" onclick="copyText('Authorization: ApiKey ${apiKey}\\nContent-Type: application/json')">Copiar</button>
           </div>
           <div class="ph-step-desc" style="margin-bottom:4px"><strong>Body (JSON):</strong></div>
           <div class="webhook-box" style="font-size:11px">
             <pre style="margin:0;white-space:pre-wrap;word-break:break-all">${escHtml(body)}</pre>
             <button class="webhook-copy" onclick="copyText(\`${body.replace(/`/g,'\\`')}\`)">Copiar</button>
           </div>
         </div>
       </div>
       <div class="ph-step">
         <div class="ph-step-num">4</div>
         <div class="ph-step-body">
           <div class="ph-step-title">Testar e salvar</div>
           <div class="ph-step-desc">Use "Test Action" no PostHog para simular o evento e verificar no <strong>Feed de Atividade</strong> se a notificação foi criada no Novu.</div>
         </div>
       </div>
     </div>
     ${!j.workflowId||j.workflowId==='SEU_WORKFLOW_ID'?`<div style="margin-top:12px;padding:10px 12px;background:var(--yel-lt);border:1px solid var(--yel-bd);border-radius:8px;font-size:11px;color:var(--yellow)"><strong>Atenção:</strong> Esta jornada não tem um workflow Novu vinculado ainda. Crie o workflow em <strong>Workflows</strong> e edite esta jornada para adicionar o ID correto.</div>`:''}`,
    `<button class="btn btn-secondary" onclick="closeModal()">Fechar</button>`,
    true
  );
}

function copyText(txt){
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast('Copiado!','ok')).catch(()=>_copyFallback(txt));
  } else { _copyFallback(txt); }
}
function _copyFallback(txt){
  const ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');toast('Copiado!','ok');}catch(e){toast('Copie manualmente','err');}
  document.body.removeChild(ta);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function testConn(){
  toast('Testando...','info');
  const url=document.getElementById('cfg-url')?.value?.trim();
  const key=document.getElementById('cfg-key')?.value?.trim();
  try{const r=await fetch(url+'/v1/health-check',{headers:{'Authorization':`ApiKey ${key}`}});if(r.ok)toast('Conexão OK!','ok');else toast('Erro '+r.status,'err');}
  catch(e){toast('Sem resposta — execute: docker compose up -d','err');}
}
function saveSettings(){
  CFG.apiUrl=document.getElementById('cfg-url')?.value?.trim()||CFG.apiUrl;
  CFG.apiKey=document.getElementById('cfg-key')?.value?.trim()||CFG.apiKey;
  CFG.phHost=document.getElementById('cfg-ph-host')?.value?.trim()||CFG.phHost;
  CFG.phToken=document.getElementById('cfg-ph-token')?.value?.trim()||CFG.phToken;
  CFG.phApiKey=document.getElementById('cfg-ph-apikey')?.value?.trim()||'';
  CFG.phProjectId=document.getElementById('cfg-ph-projid')?.value?.trim()||'';
  localStorage.setItem('crm-cfg',JSON.stringify(CFG));
  toast('Salvo!','ok'); closeModal(); checkConn();
}
