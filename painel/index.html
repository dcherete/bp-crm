<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Hub · Brasil Paralelo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#C8102E;--red-lt:rgba(200,16,46,.08);--red-bd:rgba(200,16,46,.22);
  --green:#16A34A;--green-lt:rgba(22,163,74,.08);--green-bd:rgba(22,163,74,.22);
  --yellow:#D97706;--yel-lt:rgba(217,119,6,.08);--yel-bd:rgba(217,119,6,.22);
  --blue:#2563EB;--blue-lt:rgba(37,99,235,.08);--blue-bd:rgba(37,99,235,.22);
  --purple:#7C3AED;
  --sb:#0D0D0D;--sbw:224px;
  --bg:#F4F4F5;--surface:#FFFFFF;--border:#E4E4E7;
  --text:#111;--muted:#71717A;--light:#A1A1AA;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);background:var(--bg)}
.layout{display:grid;grid-template-columns:var(--sbw) 1fr;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{background:var(--sb);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(255,255,255,.04)}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
.sb-bp{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#2A2A2A;margin-bottom:5px}
.sb-title{font-size:17px;font-weight:700;color:#EBEBEB;letter-spacing:-.4px}
.sb-title span{color:var(--red)}
.sb-nav{flex:1;padding:8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
/* SIDEBAR GROUPS */
.sb-group{margin-bottom:1px}
.sb-group-hd{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border:none;background:none;cursor:pointer;border-radius:9px;color:#5A5A5A;font-size:13px;font-weight:600;text-align:left;transition:all .13s}
.sb-group-hd:hover{background:rgba(255,255,255,.04);color:#999}
.sb-group-hd.open{color:#C0C0C0}
.sb-group-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,.04);color:#555;transition:all .13s}
.sb-group-hd.open .sb-group-ico,.sb-group-hd:hover .sb-group-ico{background:rgba(200,16,46,.12);color:#C84040}
.sb-group-label{flex:1;font-size:13px;font-weight:600}
.sb-chevron{width:14px;height:14px;flex-shrink:0;transition:transform .22s;color:#333;margin-left:2px}
.sb-group-hd.open .sb-chevron{transform:rotate(180deg);color:#555}
.sb-group-items{overflow:hidden;max-height:0;transition:max-height .22s ease-out}
.sb-group-items.open{max-height:360px}
/* Nav sub-items */
.nav-btn{display:flex;align-items:center;gap:8px;padding:7px 10px 7px 14px;border-radius:7px;cursor:pointer;color:#4A4A4A;font-size:12px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:all .12s;margin-left:16px;margin-right:4px;width:calc(100% - 20px)}
.nav-btn:hover{background:rgba(255,255,255,.04);color:#AAA}
.nav-btn.active{background:rgba(200,16,46,.14);color:#F0F0F0}
.nav-btn.active .ni{color:var(--red);opacity:1}
.ni{width:14px;height:14px;flex-shrink:0;opacity:.55}
.nb{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center}
.sb-foot{padding:10px;border-top:1px solid rgba(255,255,255,.05)}
.conn{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:8px;background:rgba(255,255,255,.025);font-size:11px;color:#444;cursor:pointer;border:none;width:100%;text-align:left}
.conn:hover{background:rgba(255,255,255,.05)}
.cdot{width:7px;height:7px;border-radius:50%;background:#2A2A2A;flex-shrink:0;transition:all .3s}
.cdot.ok{background:var(--green);box-shadow:0 0 6px rgba(22,163,74,.5)}
.cdot.err{background:var(--red);box-shadow:0 0 6px rgba(200,16,46,.4)}

/* MAIN */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;letter-spacing:-.2px}
.topbar-actions{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:24px 28px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .13s;font-family:inherit;line-height:1}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:#A50D24}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--bg)}
.btn-ghost{background:none;color:var(--muted);padding:6px 10px}.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-danger{background:rgba(200,16,46,.08);color:var(--red);border:1px solid var(--red-bd)}.btn-danger:hover{background:rgba(200,16,46,.15)}
.btn-green{background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd)}.btn-green:hover{background:rgba(22,163,74,.15)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:13px;font-weight:700}
.card-body{padding:18px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.stat-card .slbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.stat-card .sval{font-size:34px;font-weight:900;letter-spacing:-1.5px;line-height:1;margin-bottom:5px}
.stat-card .ssub{font-size:11px;color:var(--muted)}
.c-red{color:var(--red)}.c-green{color:var(--green)}.c-yellow{color:var(--yellow)}.c-blue{color:var(--blue)}.c-purple{color:var(--purple)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:9px 14px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border)}
tbody td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(0,0,0,.016)}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.tg-green{background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd)}
.tg-red{background:var(--red-lt);color:var(--red);border:1px solid var(--red-bd)}
.tg-yellow{background:var(--yel-lt);color:var(--yellow);border:1px solid var(--yel-bd)}
.tg-blue{background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-bd)}
.tg-gray{background:#F4F4F5;color:var(--muted);border:1px solid #E4E4E7}

/* FORM */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;margin-bottom:5px}
.form-control{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:var(--surface);font-family:inherit;transition:border-color .13s}
.form-control:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.08)}
textarea.form-control{resize:vertical;min-height:80px}
select.form-control{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-hint{font-size:11px;color:var(--muted);margin-top:4px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-lg{max-width:620px}
.modal-xl{max-width:860px}
.recip-list{border:1.5px solid var(--border);border-radius:10px;max-height:150px;overflow-y:auto;background:var(--bg)}
.recip-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;transition:background .1s}
.recip-item:last-child{border-bottom:none}
.recip-item:hover{background:rgba(255,255,255,.04)}
.recip-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--red);cursor:pointer;flex-shrink:0}
.recip-item .ri-name{font-weight:600;color:var(--text)}
.recip-item .ri-sub{font-size:11px;color:var(--muted)}
.recip-item .ri-badge{margin-left:auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.audience-card{background:rgba(255,255,255,.03);border:1.5px solid var(--border);border-radius:16px;padding:20px 16px;text-align:center;position:sticky;top:0}
.audience-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.modal-hd{padding:20px 22px 0;display:flex;align-items:center;justify-content:space-between}
.modal-hd h2{font-size:17px;font-weight:700}
.modal-bd{padding:18px 22px}
.modal-ft{padding:0 22px 20px;display:flex;justify-content:flex-end;gap:8px}
.close-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:6px;display:flex}
.close-btn:hover{background:var(--bg);color:var(--text)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;max-width:280px}
.search-wrap input{padding-left:34px}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--light);pointer-events:none}

/* EMPTY / LOADING */
.empty{padding:48px;text-align:center;color:var(--muted)}
.empty-ico{width:44px;height:44px;margin:0 auto 14px;opacity:.25}
.empty h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px}
.empty p{font-size:13px}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted);font-size:13px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{background:#111;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.3);display:flex;align-items:center;gap:9px;min-width:220px;animation:slideUp .2s ease}
.toast.ok .ticon{color:var(--green)}.toast.err .ticon{color:var(--red)}.toast.info .ticon{color:#60A5FA}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* PAGINATION */
.pager{display:flex;align-items:center;gap:6px;padding:11px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.pager .pi{flex:1}
.pg-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-size:12px;font-weight:500}
.pg-btn:hover{background:var(--bg)}.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-btn.cur{background:var(--red);color:#fff;border-color:var(--red)}

/* SEGMENTS */
.seg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.seg-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;transition:all .13s}
.seg-card:hover{border-color:rgba(200,16,46,.4);box-shadow:0 0 0 3px rgba(200,16,46,.06)}
.seg-name{font-size:14px;font-weight:700;margin-bottom:3px}
.seg-key{font-size:10px;color:var(--muted);font-family:monospace;background:var(--bg);padding:1px 6px;border-radius:4px}
.seg-count{font-size:12px;color:var(--muted);margin-top:6px}
.seg-actions{display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}

/* CAMPAIGNS */
.camp-list{display:flex;flex-direction:column;gap:10px}
.camp-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px}
.camp-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.camp-icon.email{background:var(--blue-lt);color:var(--blue)}
.camp-icon.push{background:rgba(124,58,237,.08);color:var(--purple)}
.camp-icon.both{background:var(--red-lt);color:var(--red)}
.camp-info{flex:1}
.camp-name{font-size:14px;font-weight:700;margin-bottom:3px}
.camp-meta{font-size:11px;color:var(--muted)}
.camp-actions{display:flex;gap:6px;align-items:center}

/* WIZARD */
.wizard-steps{display:flex;align-items:center;margin-bottom:20px}
.wstep{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--muted)}
.wstep.active{color:var(--red)}.wstep.done{color:var(--green)}
.wnum{width:24px;height:24px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.wstep.done .wnum{background:var(--green);border-color:var(--green);color:#fff}
.wstep.active .wnum{background:var(--red);border-color:var(--red);color:#fff}
.wline{flex:1;height:1px;background:var(--border);margin:0 6px}

/* FEED */
.feed-tabs{display:flex;gap:4px;margin-bottom:14px}
.feed-tab{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .13s}
.feed-tab:hover{background:var(--bg)}.feed-tab.active{background:var(--red);color:#fff;border-color:var(--red)}

/* WORKFLOW CARDS */
.wf-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.wf-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;transition:all .13s}
.wf-card:hover{border-color:rgba(200,16,46,.3)}
.wf-name{font-size:14px;font-weight:700;margin-bottom:4px}
.wf-id{font-size:10px;color:var(--muted);font-family:monospace;background:var(--bg);padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:8px}
.wf-steps{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.wf-actions{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--border)}

/* WORKFLOW TABS */
.wf-tabs{display:flex;gap:4px;margin-bottom:16px}
.wf-tab{padding:7px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .13s}
.wf-tab:hover{background:var(--bg)}.wf-tab.active{background:var(--red);color:#fff;border-color:var(--red)}
.editor-wrap{border-radius:12px;overflow:hidden;border:1px solid var(--border);background:#000}
.editor-wrap iframe{width:100%;display:block;border:none}

/* PROGRESS */
.progress-wrap{background:var(--bg);border-radius:6px;height:8px;overflow:hidden;margin:8px 0}
.progress-bar{height:100%;background:var(--green);border-radius:6px;transition:width .3s ease}

/* CHANNEL TOGGLE */
.ch-toggle{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ch-toggle:last-child{border-bottom:none}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:#D1D5DB;border-radius:20px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s}
.toggle input:checked + .toggle-slider{background:var(--green)}
.toggle input:checked + .toggle-slider:before{transform:translateX(16px)}

/* CSV PREVIEW */
.csv-preview{font-size:11px;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:10px}
.csv-preview table{font-size:11px}
.csv-preview thead th{padding:6px 10px;font-size:9px}
.csv-preview tbody td{padding:6px 10px}

/* SUPPRESSION */
.supp-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.supp-item:last-child{border-bottom:none}
.supp-email{flex:1;font-size:13px}
.supp-date{font-size:11px;color:var(--muted)}

/* MISC */
.flex-between{display:flex;justify-content:space-between;align-items:center}
.text-muted{color:var(--muted)}.text-sm{font-size:12px}
.mt8{margin-top:8px}.mt16{margin-top:16px}
.chip{display:inline-flex;align-items:center;padding:3px 10px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:600;color:var(--muted)}
.check-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px}
.check-row:last-child{border-bottom:none}
.check-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--red);cursor:pointer;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:14px 0}
code{font-size:11px;background:#f4f4f5;padding:2px 7px;border-radius:4px;letter-spacing:.2px}

/* JORNADAS */
.jorn-list{display:flex;flex-direction:column;gap:12px}
.jorn-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;display:flex;align-items:flex-start;gap:16px;transition:all .13s}
.jorn-card:hover{border-color:rgba(200,16,46,.3)}
.jorn-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(124,58,237,.1);color:#7C3AED}
.jorn-main{flex:1}
.jorn-name{font-size:15px;font-weight:700;margin-bottom:3px}
.jorn-trigger{font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.jorn-flow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.jorn-step{display:flex;align-items:center;gap:5px}
.jorn-step-box{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:4px 10px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.jorn-arrow{color:var(--light);font-size:12px}
.jorn-actions{display:flex;gap:6px;align-items:center}
.jorn-status-active{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--green)}
.jorn-status-draft{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--muted)}

/* STEP BUILDER */
.step-builder{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.step-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative}
.step-item-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--red);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-type{font-size:13px;font-weight:700;flex:1}
.step-remove{background:none;border:none;cursor:pointer;color:var(--muted);padding:2px;border-radius:4px;display:flex;line-height:1}
.step-remove:hover{color:var(--red);background:var(--red-lt)}
.step-conn{text-align:center;font-size:11px;color:var(--light);padding:2px 0}
.add-step-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}

/* WEBHOOK BOX */
.webhook-box{background:#0d1117;border-radius:10px;padding:14px 16px;font-family:monospace;font-size:11px;color:#e6edf3;line-height:1.8;overflow-x:auto;position:relative}
.webhook-copy{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.1);border:none;border-radius:5px;color:#e6edf3;font-size:11px;padding:3px 8px;cursor:pointer}
.webhook-copy:hover{background:rgba(255,255,255,.2)}
.ph-steps{counter-reset:step}
.ph-step{counter-increment:step;display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.ph-step:last-child{border-bottom:none}
.ph-step-num{width:24px;height:24px;border-radius:50%;background:var(--purple);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ph-step-body{flex:1}
.ph-step-title{font-size:13px;font-weight:700;margin-bottom:4px}
.ph-step-desc{font-size:12px;color:var(--muted);line-height:1.6}

/* CAMPAIGN CHANNEL CARDS */
.ch-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.ch-card{border:2px solid var(--border);border-radius:14px;padding:18px 14px 14px;cursor:pointer;transition:all .15s;background:var(--surface);text-align:center;user-select:none}
.ch-card:hover{border-color:rgba(200,16,46,.35);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.ch-card.selected{border-color:var(--red);background:var(--red-lt)}
.ch-card-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.ch-card-name{font-size:13px;font-weight:700;margin-bottom:2px}
.ch-card-desc{font-size:11px;color:var(--muted);line-height:1.4}
/* POSTHOG AUDIENCE BUILDER */
.event-pill,.time-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .13s;background:var(--surface);color:var(--muted);margin:3px 2px}
.event-pill:hover{border-color:var(--purple);color:var(--purple)}
.event-pill.sel{border-color:var(--purple);background:rgba(124,58,237,.08);color:var(--purple)}
.time-pill:hover{border-color:var(--blue);color:var(--blue)}
.time-pill.sel{border-color:var(--blue);background:var(--blue-lt);color:var(--blue)}
.ph-audience-banner{background:linear-gradient(135deg,rgba(124,58,237,.07) 0%,rgba(37,99,235,.06) 100%);border:1px solid rgba(124,58,237,.2);border-radius:14px;padding:16px 20px;margin-bottom:18px;display:flex;align-items:flex-start;gap:14px}
.camp-preview{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:8px}
.camp-preview-hd{padding:9px 14px;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px}
.camp-preview-body{padding:14px 16px;font-size:13px;line-height:1.7;max-height:160px;overflow-y:auto;word-break:break-word}
.seg-count-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--blue-lt);border:1px solid var(--blue-bd);border-radius:20px;font-size:11px;font-weight:700;color:var(--blue);margin-top:6px}
</style>
</head>
<body>

          <button class="nav-btn" onclick="nav('jornadas')" id="nb-jornadas">

          <button class="nav-btn" onclick="nav('workflows')" id="nb-workflows">
            <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="3" cy="8" r="2"/><circle cx="13" cy="4" r="2"/><circle cx="13" cy="12" r="2"/><path d="M5 8h3l2-4M5 8h3l2 4"/></svg>
            Workflows

      </div>

      <!-- AUDIÊNCIA -->
      <div class="sb-group">
        <button class="sb-group-hd open" id="ghd-audiencia" onclick="toggleGroup('audiencia')">
          <div class="sb-group-ico">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="2.5" fill="currentColor" opacity=".75"/><circle cx="11.5" cy="5" r="2" fill="currentColor" opacity=".35"/><path d="M1 14c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="currentColor" stroke-width="1.3"/><path d="M12.5 9c1.5.6 2.5 2 2.5 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity=".4"/></svg>

<div class="overlay hidden" id="overlay" onclick="handleOverlayClick(event)">

</div>
<div class="toast-wrap" id="toasts"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const CFG = {
  apiUrl: 'http://localhost:3000',
  apiKey: 'ba45b4826e9fc72cf277fe77921b0134',
  phHost: 'https://us.posthog.com',
  phToken: 'phc_vBnjOoSUQYaiDtMBhXQCa4b4dFsSr1nr5D7S377YJwP',
  phApiKey: '',
  phProjectId: ''
};
try { Object.assign(CFG, JSON.parse(localStorage.getItem('crm-cfg') || '{}')); } catch(e) {}

// ── POSTHOG CAPTURE ───────────────────────────────────────
async function phCapture(event, props = {}) {
  if (!CFG.phToken || !CFG.phHost) return;
  try {
    await fetch(CFG.phHost + '/capture/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        api_key: CFG.phToken,
        event,
        distinct_id: 'crm-panel',
        properties: { ...props, $lib: 'crm-hub', source: 'painel' }
      })
    });
  } catch(e) {} // falha silenciosa — PostHog é analytics, não bloqueia operação
}

function phStatus() {
  return !!(CFG.phToken && CFG.phHost);
}

// ── API ───────────────────────────────────────────────────
const api = {
  h() { return { 'Authorization': `ApiKey ${CFG.apiKey}`, 'Content-Type': 'application/json' }; },
  async get(p) {
    const r = await fetch(CFG.apiUrl + p, { headers: this.h() });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  },
  async post(p, b) {
    const r = await fetch(CFG.apiUrl + p, { method: 'POST', headers: this.h(), body: JSON.stringify(b) });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j.message || r.status);
    return j;
  },
  async del(p) {
    const r = await fetch(CFG.apiUrl + p, { method: 'DELETE', headers: this.h() });
    if (!r.ok) throw new Error(r.status);
    return r.json().catch(() => ({}));
  },
  async patch(p, b) {
    const r = await fetch(CFG.apiUrl + p, { method: 'PATCH', headers: this.h(), body: JSON.stringify(b) });
    if (!r.ok) throw new Error(r.status);
    return r.json().catch(() => ({}));
  }
};

// ── TOAST ─────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const ico = { ok:'<path d="M3 8l3.5 3.5L13 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>', err:'<path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>', info:'<circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 7v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<svg class="ticon" width="16" height="16" viewBox="0 0 16 16" fill="none">${ico[type]||ico.info}</svg><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 4500);
}

// ── MODAL ─────────────────────────────────────────────────
function openModal(title, body, footer, large = false) {
  const szCls = large === 'xl' ? ' modal-xl' : large ? ' modal-lg' : '';
  document.getElementById('modal').className = 'modal' + szCls;
  document.getElementById('modal').innerHTML = `
    <div class="modal-hd"><h2>${title}</h2><button class="close-btn" onclick="closeModal()"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button></div>
    <div class="modal-bd">${body}</div>
    <div class="modal-ft">${footer}</div>`;
  document.getElementById('overlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('overlay').classList.add('hidden'); }
function handleOverlayClick(e) { if (e.target.id === 'overlay') closeModal(); }

// ── HELPERS ───────────────────────────────────────────────
const loader = () => `<div class="loading"><div class="spin"></div> Carregando...</div>`;
function emptyState(icon, h, p) { return `<div class="empty">${icon}<h3>${h}</h3><p>${p}</p></div>`; }
function fdate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }); }
function slug(s) { return (s||'').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'').replace(/(^-|-$)/g,'')||'item-'+Date.now(); }
function apiErr() { return emptyState(`<svg class="empty-ico" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="22" r="16" stroke="currentColor" stroke-width="2"/><path d="M22 14v8M22 28v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,'Não foi possível conectar','Verifique se o ambiente está rodando. <button class="btn btn-secondary btn-sm" onclick="openSettings()" style="margin-top:8px">Configurações</button>'); }
function chTag(ch) { if(ch==='email') return '<span class="tag tg-blue">Email</span>'; if(ch==='push') return '<span class="tag" style="background:rgba(124,58,237,.08);color:#7C3AED;border:1px solid rgba(124,58,237,.2)">Push</span>'; return `<span class="tag tg-gray">${ch||'—'}</span>`; }
function statusTag(s) { if(s==='completed'||s==='sent') return '<span class="tag tg-green">Entregue</span>'; if(s==='failed') return '<span class="tag tg-red">Falha</span>'; if(s==='seen') return '<span class="tag tg-blue">Visualizado</span>'; return '<span class="tag tg-yellow">Pendente</span>'; }

// ── CONNECTION ────────────────────────────────────────────
async function checkConn() {
  const dot = document.getElementById('cdot'), lbl = document.getElementById('clabel');
  lbl.textContent = 'Verificando...'; dot.className = 'cdot';
  try {
    await api.get('/v1/health-check');
    dot.className = 'cdot ok'; lbl.textContent = 'Novu conectado';
    loadSubBadge();
  } catch(e) { dot.className = 'cdot err'; lbl.textContent = 'Novu sem conexão'; }
  checkPhConn();
}
async function checkPhConn() {
  const dot = document.getElementById('ph-dot'), lbl = document.getElementById('ph-label');
  if (!dot || !lbl) return;
  if (!CFG.phToken) { dot.className = 'cdot'; lbl.textContent = 'PostHog (sem token)'; return; }
  try {
    // Envia evento de heartbeat para verificar se o token é válido
    const r = await fetch(CFG.phHost + '/capture/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: CFG.phToken, event: 'crm_panel_opened', distinct_id: 'crm-panel', properties: { $lib: 'crm-hub' } })
    });
    if (r.ok || r.status === 200) { dot.className = 'cdot ok'; lbl.textContent = 'PostHog conectado'; }
    else { dot.className = 'cdot err'; lbl.textContent = 'PostHog erro ' + r.status; }
  } catch(e) { dot.className = 'cdot err'; lbl.textContent = 'PostHog sem conexão'; }
}
async function loadSubBadge() {
  try {
    const r = await api.get('/v1/subscribers?limit=1&page=0');
    const n = r.totalCount ?? r.data?.length ?? 0;
    document.getElementById('badge-sub').textContent = n > 999 ? (n/1000).toFixed(1)+'k' : n;
  } catch(e) {}
}
function updateSuppBadge() {
  const n = getSupp().length;
  const el = document.getElementById('badge-supp');
  if (el) el.textContent = n;
}

// ── SIDEBAR GROUPS ────────────────────────────────────────
const _grpOpen = {analises:true, campanhas:true, audiencia:true};
function toggleGroup(id) {
  _grpOpen[id] = !_grpOpen[id];
  document.getElementById('ghd-'+id)?.classList.toggle('open', _grpOpen[id]);
  document.getElementById('gi-'+id)?.classList.toggle('open', _grpOpen[id]);
}
const _sectionGroup = {
  dashboard:'analises', feed:'analises',
  'camp-email':'campanhas','camp-whatsapp':'campanhas','camp-push-app':'campanhas','camp-push-web':'campanhas','camp-inapp':'campanhas',
  campaigns:'campanhas', jornadas:'campanhas', workflows:'campanhas',
  subscribers:'audiencia', segments:'audiencia', unsubscribes:'audiencia', suppression:'audiencia'
};

// ── ROUTER ────────────────────────────────────────────────
let _cur = 'dashboard', _feedTimer = null;
function nav(section) {
  clearInterval(_feedTimer);
  _cur = section;
  document.getElementById('content').style.padding = '24px 28px';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nb-' + section);
  if (nb) nb.classList.add('active');
  // auto-expand the group that owns this section
  const grp = _sectionGroup[section];
  if (grp && !_grpOpen[grp]) toggleGroup(grp);
  const titles = { dashboard:'Dashboard', subscribers:'Subscribers', workflows:'Workflows', segments:'Segmentos', campaigns:'Campanhas', jornadas:'Jornadas', feed:'Feed de Atividade', unsubscribes:'Descadastros', suppression:'Lista de Supressão', 'camp-email':'Campanhas — Email', 'camp-whatsapp':'Campanhas — WhatsApp', 'camp-push-app':'Campanhas — App Push', 'camp-push-web':'Campanhas — Web Push', 'camp-inapp':'Campanhas — In-App' };
  document.getElementById('page-title').textContent = titles[section] || section;
  document.getElementById('page-actions').innerHTML = '';
  const chMap = {'camp-email':'email','camp-whatsapp':'whatsapp','camp-push-app':'push-app','camp-push-web':'push-web'};
  if (section === 'camp-email') { renderEmailPage(); return; }
  if (section === 'camp-inapp') { renderInApp(); return; }
  if (chMap[section]) { renderCampaigns(chMap[section]); return; }
  ({ dashboard:renderDashboard, subscribers:renderSubscribers, workflows:renderWorkflows, segments:renderSegments, campaigns:renderCampaigns, jornadas:renderJornadas, feed:renderFeed, unsubscribes:renderUnsubscribes, suppression:renderSuppression })[section]?.();
}

// ════════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════════
async function renderDashboard() {
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="slbl">Subscribers</div><div class="sval c-blue" id="ds-subs"><div class="spin" style="width:22px;height:22px;border-width:3px;display:inline-block"></div></div><div class="ssub">na base</div></div>

function openImportCSV() {
  openModal('Importar Subscribers via CSV',
    `<div class="form-group"><label>Arquivo CSV <span style="color:var(--red)">*</span></label>
      <input type="file" class="form-control" id="csv-file" accept=".csv,.txt" onchange="previewCSV(this)">
      <div class="form-hint">Colunas aceitas: <strong>email</strong> (obrigatório), firstName, lastName, subscriberId. Primeira linha = cabeçalho.</div>
    </div>
    <div id="csv-preview-wrap"></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="csv-import-btn" onclick="doImportCSV()" disabled>Importar</button>`,
    true
  );
}

let _csvRows = [];
function previewCSV(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.trim().split(/\r?\n/);
    if (lines.length < 2) { toast('CSV vazio ou sem dados','err'); return; }
    const headers = lines[0].split(/[,;]/).map(h=>h.trim().toLowerCase().replace(/['"]/g,''));
    const emailIdx = headers.findIndex(h=>h.includes('email'));
    if (emailIdx === -1) { toast('Coluna "email" não encontrada','err'); return; }
    const fnIdx = headers.findIndex(h=>h.includes('first')||h==='nome'||h==='name');
    const lnIdx = headers.findIndex(h=>h.includes('last')||h.includes('sobrenome'));
    const sidIdx = headers.findIndex(h=>h.includes('id'));
    const supp = getSupp().map(s=>s.email);

    _csvRows = lines.slice(1).map(line => {
      const cols = line.split(/[,;]/).map(c=>c.trim().replace(/['"]/g,''));
      return { email:cols[emailIdx]||'', firstName:fnIdx>=0?cols[fnIdx]:'', lastName:lnIdx>=0?cols[lnIdx]:'', subscriberId:sidIdx>=0&&sidIdx!==emailIdx?cols[sidIdx]:'' };
    }).filter(r=>r.email && r.email.includes('@') && !supp.includes(r.email));

    const skipped = lines.length - 1 - _csvRows.length;
    const previewRows = _csvRows.slice(0,5).map(r=>`<tr><td>${r.email}</td><td>${r.firstName||'—'}</td><td>${r.lastName||'—'}</td><td>${r.subscriberId||'<span class="text-muted">auto</span>'}</td></tr>`).join('');
    document.getElementById('csv-preview-wrap').innerHTML = `
      <div style="font-size:12px;margin-bottom:8px;color:var(--muted)">
        <strong style="color:var(--text)">${_csvRows.length}</strong> subscribers para importar${skipped?' · <span style="color:var(--red)">'+skipped+' ignorados (suprimidos/inválidos)</span>':''}
        ${_csvRows.length>5?` · mostrando 5 de ${_csvRows.length}`:''}
      </div>
      <div class="csv-preview"><table><thead><tr><th>Email</th><th>Nome</th><th>Sobrenome</th><th>ID</th></tr></thead><tbody>${previewRows}</tbody></table></div>`;
    document.getElementById('csv-import-btn').disabled = _csvRows.length === 0;
  };
  reader.readAsText(file);
}

async function doImportCSV() {
  if (!_csvRows.length) return;
  closeModal();
  const total = _csvRows.length;
  let done = 0, errors = 0;
  toast(`Importando ${total} subscribers...`, 'info');

  // show progress in content area
  const el = document.getElementById('content');
  el.innerHTML = `<div class="card"><div class="card-body">
    <h3 style="margin-bottom:14px">Importando CSV</h3>
    <div class="flex-between text-sm text-muted" style="margin-bottom:6px"><span id="imp-status">Iniciando...</span><span id="imp-count">0/${total}</span></div>
    <div class="progress-wrap"><div class="progress-bar" id="imp-bar" style="width:0%"></div></div>
    <p class="text-sm text-muted mt8">Não feche esta aba durante a importação.</p>
  </div></div>`;

  for (let i = 0; i < _csvRows.length; i++) {
    const r = _csvRows[i];
    try {
      await api.post('/v1/subscribers', { subscriberId: r.subscriberId||'csv-'+Date.now()+'-'+i, email: r.email, firstName: r.firstName, lastName: r.lastName });
      done++;
    } catch(e) { errors++; }
    const pct = Math.round(((i+1)/total)*100);
    const bar = document.getElementById('imp-bar'), cnt = document.getElementById('imp-count'), st = document.getElementById('imp-status');
    if (bar) bar.style.width = pct+'%';
    if (cnt) cnt.textContent = `${i+1}/${total}`;
    if (st) st.textContent = `Importando ${r.email}...`;
    if ((i+1) % 10 === 0) await new Promise(r => setTimeout(r, 50));
  }

  toast(`Importação concluída: ${done} adicionados${errors?' · '+errors+' erros':''}`, errors?'info':'ok');
  phCapture('subscribers_imported', { total, imported: done, errors, source: 'csv' });
  loadSubBadge();
  setTimeout(() => renderSubscribers(), 800);
}

async function doCreateWorkflow() {
  const name = document.getElementById('wf-name')?.value?.trim();
  const wfId = document.getElementById('wf-id')?.value?.trim() || slug(name||'workflow');
  const ch = document.querySelector('input[name="wf-ch"]:checked')?.value || 'email';

  const body = document.getElementById('wf-body')?.value || '{{payload.body}}';
  if (!name) { toast('Nome é obrigatório','err'); return; }

  const steps = [];
  if (ch==='email'||ch==='both') steps.push({ name:'Email', type:'email', controlValues:{ subject:subj, body:`<p>${body}</p>` } });
  if (ch==='push'||ch==='both') steps.push({ name:'Push', type:'push', controlValues:{ subject:'{{payload.title||subscriber.firstName}}', body } });

  try {
    await api.post('/v2/workflows', { name, workflowId:wfId, active:true, steps });
    toast('Workflow criado!','ok'); closeModal(); renderWorkflows();
  } catch(e) {
    // fallback: try v1 notification-templates endpoint
    try {
      await api.post('/v1/notification-templates', { name, notificationGroupId:null, active:true, steps: steps.map(s=>({ type:s.type==='email'?'EMAIL':'PUSH', template:{ type:s.type==='email'?'EMAIL':'PUSH', content:body, subject:subj } })) });
      toast('Workflow criado!','ok'); closeModal(); renderWorkflows();
    } catch(e2) {
      toast('Use o editor avançado (localhost:4000) para criar workflows','err');
      setTimeout(()=>window.open('http://localhost:4000','_blank'),1000);
    }
  }
}

async function doNewSeg(usePH) {
  const name=document.getElementById('sg-name')?.value?.trim();
  if(!name){toast('Nome é obrigatório','err');return;}
  const desc=document.getElementById('sg-desc')?.value?.trim()||'';
  if(usePH){
    try{
      const r=await fetch(`${CFG.phHost}/api/projects/${CFG.phProjectId}/cohorts/`,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${CFG.phApiKey}`},
        body:JSON.stringify({name,description:desc,is_static:true,groups:[]})
      });
      if(!r.ok)throw new Error(await r.text());
      toast('Cohort criado no PostHog!','ok');closeModal();renderSegments();
    }catch(e){toast('Erro PostHog: '+e.message,'err');}
  } else {
    const key=document.getElementById('sg-key')?.value?.trim()||slug(name);
    try{await api.post('/v1/topics',{key,name});toast('Segmento Novu criado!','ok');closeModal();renderSegments();}
    catch(e){toast('Erro Novu: '+e.message,'err');}
  }
}

async function deletePHCohort(id, name) {
  if(!confirm(`Remover cohort "${name}" do PostHog?`))return;
  try{
    await fetch(`${CFG.phHost}/api/projects/${CFG.phProjectId}/cohorts/${id}/`,{method:'DELETE',headers:{'Authorization':`Bearer ${CFG.phApiKey}`}});
    toast('Cohort removido','ok');renderSegments();
  }catch(e){toast('Erro: '+e.message,'err');}
}

async function syncCohortToNovu(cohortId, cohortName) {
  toast('Buscando pessoas do cohort...','info');
  try{
    const r=await fetch(`${CFG.phHost}/api/projects/${CFG.phProjectId}/cohorts/${cohortId}/persons?limit=1000`,{headers:{'Authorization':`Bearer ${CFG.phApiKey}`}});
    const d=await r.json();
    const ids=(d.results||[]).map(p=>p.distinct_ids?.[0]).filter(Boolean);
    if(!ids.length){toast('Cohort vazio — nenhum subscriber para sincronizar','err');return;}
    const key='ph-cohort-'+cohortId;
    try{await api.post('/v1/topics',{key,name:cohortName});}catch(e){}
    for(let i=0;i<ids.length;i+=100)await api.post(`/v1/topics/${key}/subscribers`,{subscribers:ids.slice(i,i+100)});
    toast(`${ids.length} pessoas sincronizadas para Novu Topic "${cohortName}"!`,'ok');
    renderSegments();
  }catch(e){toast('Erro na sincronização: '+e.message,'err');}
}

async function openAddToSeg(topicKey, topicName) {
  let subs=[]; try{subs=(await api.get('/v1/subscribers?limit=100&page=0')).data||[];}catch(e){}
  const list=subs.length?subs.map(s=>`<label class="check-row"><input type="checkbox" class="seg-chk" value="${s.subscriberId}"><span>${[s.firstName,s.lastName].filter(Boolean).join(' ')||s.subscriberId} <span class="text-muted"> — ${s.email||s.subscriberId}</span></span></label>`).join(''):'<p class="text-muted text-sm">Nenhum subscriber encontrado.</p>';
  openModal(`Adicionar ao segmento: ${topicName}`,`<div style="max-height:300px;overflow-y:auto">${list}</div>`,`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="doAddToSeg('${topicKey}')">Adicionar Selecionados</button>`);
}
async function doAddToSeg(topicKey) {
  const ids=Array.from(document.querySelectorAll('.seg-chk:checked')).map(el=>el.value);
  if(!ids.length){toast('Selecione ao menos um subscriber','err');return;}
  try{await api.post(`/v1/topics/${topicKey}/subscribers`,{subscribers:ids});toast(`${ids.length} subscriber(s) adicionado(s)!`,'ok');closeModal();}
  catch(e){toast('Erro: '+e.message,'err');}
}
async function deleteSeg(key,name) {
  if(!confirm(`Remover segmento "${name}"?`))return;
  try{await api.del(`/v1/topics/${key}`);toast('Segmento removido','ok');renderSegments();}
  catch(e){toast('Erro: '+e.message,'err');}
}

function abPickEvent(eventId, el) {
  _ab.event = eventId;
  document.querySelectorAll('.event-pill').forEach(p=>p.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('ab-custom-event').style.display = 'none';
  const labels = {notification_opened:'Abriram email',notification_clicked:'Clicaram em link',notification_sent:'Receberam notificação',notification_delivered:'Email entregue'};
  const nameEl = document.getElementById('ab-seg-name');
  if(nameEl) nameEl.value = `${labels[eventId]||eventId} — últimos ${_ab.days||30} dias`;
}
function abPickCustom(el) {
  document.querySelectorAll('.event-pill').forEach(p=>p.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('ab-custom-event').style.display = '';
  _ab.event = '';
}
function abPickDays(d, el) {
  _ab.days = d;
  document.querySelectorAll('.time-pill').forEach(p=>p.classList.remove('sel'));
  el.classList.add('sel');
  const nameEl = document.getElementById('ab-seg-name');
  if(nameEl && nameEl.value) nameEl.value = nameEl.value.replace(/últimos \d+ dias/,`últimos ${d} dias`);
}

async function doAudienceSearch() {
  if(!CFG.phApiKey || !CFG.phProjectId) { toast('Configure a PostHog Personal API Key nas Configurações','err'); return; }
  if(!_ab.event) { toast('Selecione ou informe um evento','err'); return; }
  const el = document.getElementById('ab-result');
  el.innerHTML = '<div class="loading" style="padding:14px 0"><div class="spin"></div> Consultando PostHog...</div>';
  const btn = document.getElementById('ab-search-btn');
  btn.disabled = true;
  try {
    const ids = await queryPostHogAudience(_ab.event, _ab.days||30, _ab.workflowFilter);
    _ab.resultIds = ids;
    if(!ids.length) {
      el.innerHTML = `<div style="padding:10px 14px;background:var(--yel-lt);border:1px solid var(--yel-bd);border-radius:10px;font-size:12px;color:var(--yellow)">Nenhum subscriber encontrado com esses critérios no PostHog.</div>`;
      document.getElementById('ab-create-btn').style.display = 'none';
    } else {
      el.innerHTML = `<div style="padding:12px 14px;background:var(--green-lt);border:1px solid var(--green-bd);border-radius:10px;font-size:13px;color:var(--green);display:flex;align-items:center;gap:8px">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M5 9l3 3 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span><strong>${ids.length.toLocaleString('pt-BR')}</strong> subscribers encontrados. Clique em "Criar segmento" para adicionar ao Novu.</span>
      </div>`;
      document.getElementById('ab-create-btn').style.display = '';
    }
  } catch(e) {
    el.innerHTML = `<div style="padding:10px 14px;background:var(--red-lt);border:1px solid var(--red-bd);border-radius:10px;font-size:12px;color:var(--red)"><strong>Erro:</strong> ${e.message}</div>`;
  }
  btn.disabled = false;
}

async function queryPostHogAudience(event, days, workflowFilter) {
  let where = `event = '${event}' AND timestamp > now() - interval ${days} day`;
  if(workflowFilter) where += ` AND properties.workflow_id = '${workflowFilter}'`;
  const query = `SELECT DISTINCT distinct_id FROM events WHERE ${where} LIMIT 10000`;
  const r = await fetch(`${CFG.phHost}/api/projects/${CFG.phProjectId}/query/`, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${CFG.phApiKey}`},
    body:JSON.stringify({query:{kind:'HogQLQuery',query}})
  });
  if(!r.ok){const err=await r.json().catch(()=>({}));throw new Error(err.detail||`PostHog API erro ${r.status}`);}
  const data = await r.json();
  return (data.results||[]).map(row=>row[0]).filter(Boolean);
}

async function doCreateAudience() {
  const name = document.getElementById('ab-seg-name')?.value?.trim();
  if(!name){toast('Informe o nome do segmento','err');return;}
  if(!_ab.resultIds?.length){toast('Busque a audiência primeiro','err');return;}
  const key = slug(name);
  const btn = document.getElementById('ab-create-btn');
  btn.disabled = true; btn.textContent = 'Criando...';
  try {
    await api.post('/v1/topics',{key,name});
    const ids = _ab.resultIds;
    let added = 0;
    for(let i=0;i<ids.length;i+=100){
      try{await api.post(`/v1/topics/${key}/subscribers`,{subscribers:ids.slice(i,i+100)});added+=Math.min(100,ids.length-i);}catch(e){}
    }
    toast(`Segmento "${name}" criado com ${added} subscribers!`,'ok');
    phCapture('audience_created',{event:_ab.event,days:_ab.days,count:added,source:'posthog_query'});
    closeModal(); renderSegments();
  } catch(e) {
    toast('Erro ao criar segmento: '+e.message,'err');
    btn.disabled=false; btn.textContent='Criar segmento';
  }
}

// ── EMAIL CAMPAIGNS TABLE ───────────────────────────────────
let _ectFilter = { status:'', type:'', tag:'', q:'' };

function renderEmailCampaignsTab() {
  const el = document.getElementById('email-tab-content');
  el.innerHTML = _buildEmailCampTable();
}

function _buildEmailCampTable() {
  const allCamps = getCamps();
  let camps = allCamps.map((c,i)=>({...c,_idx:i})).filter(c=>c.channel==='email'||c.channel==='both');

  // collect all tags
  const allTags = [...new Set(camps.flatMap(c=>c.tags||[]))].sort();

  // apply filters
  if (_ectFilter.status) camps = camps.filter(c=>_campStatus(c)===_ectFilter.status);
  if (_ectFilter.type)   camps = camps.filter(c=>(c.type||'single')===_ectFilter.type);
  if (_ectFilter.tag)    camps = camps.filter(c=>(c.tags||[]).includes(_ectFilter.tag));
  if (_ectFilter.q)      camps = camps.filter(c=>c.name.toLowerCase().includes(_ectFilter.q.toLowerCase()));

  camps = camps.slice().reverse();

  const statusOpts = ['','completo','programado','rascunho','cancelado'];
  const typeOpts   = ['','single','experiment','recurring'];
  const typeLbl    = {single:'Único', experiment:'Experimento', recurring:'Recorrente'};
  const statusLbl  = {'':'Status', completo:'Completo', programado:'Programado', rascunho:'Rascunho', cancelado:'Cancelado'};

  const filterBar = `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    <select id="ect-f-status" onchange="_ectFilter.status=this.value;renderEmailCampaignsTab()" style="height:34px;padding:0 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:12px;cursor:pointer">
      ${statusOpts.map(s=>`<option value="${s}" ${_ectFilter.status===s?'selected':''}>${statusLbl[s]||s}</option>`).join('')}
    </select>
    <select id="ect-f-type" onchange="_ectFilter.type=this.value;renderEmailCampaignsTab()" style="height:34px;padding:0 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:12px;cursor:pointer">
      <option value="">Tipo</option>
      ${typeOpts.slice(1).map(t=>`<option value="${t}" ${_ectFilter.type===t?'selected':''}>${typeLbl[t]}</option>`).join('')}
    </select>
    ${allTags.length?`<select id="ect-f-tag" onchange="_ectFilter.tag=this.value;renderEmailCampaignsTab()" style="height:34px;padding:0 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:12px;cursor:pointer">
      <option value="">Tags</option>
      ${allTags.map(t=>`<option value="${t}" ${_ectFilter.tag===t?'selected':''}>${t}</option>`).join('')}
    </select>`:''}
    <input id="ect-f-q" type="text" placeholder="Buscar campanha..." value="${_ectFilter.q}"
      oninput="_ectFilter.q=this.value;renderEmailCampaignsTab()"
      style="height:34px;padding:0 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:12px;width:200px;outline:none">
    ${(_ectFilter.status||_ectFilter.type||_ectFilter.tag||_ectFilter.q)?`<button onclick="_ectFilter={status:'',type:'',tag:'',q:''};renderEmailCampaignsTab()" style="height:34px;padding:0 12px;border:1.5px solid var(--border);border-radius:8px;background:none;color:var(--muted);font-size:12px;cursor:pointer">Limpar</button>`:''}
    <span style="margin-left:auto;font-size:12px;color:var(--muted)">${camps.length} campanha${camps.length!==1?'s':''}</span>
  </div>`;

  if (!camps.length) {
    return filterBar + emptyState(`<svg class="empty-ico" viewBox="0 0 44 44" fill="none"><rect x="6" y="10" width="32" height="24" rx="4" stroke="currentColor" stroke-width="2"/><path d="M6 14l16 10 16-10" stroke="currentColor" stroke-width="2"/></svg>`,'Nenhuma campanha encontrada','Ajuste os filtros ou crie uma nova campanha.');
  }

  const rows = camps.map(c=>{
    const st   = _campStatus(c);
    const dot  = {completo:'#16A34A', programado:'#D97706', rascunho:'#9CA3AF', cancelado:'#EF4444'}[st]||'#9CA3AF';
    const stLbl= {completo:'Completo', programado:'Programado', rascunho:'Rascunho', cancelado:'Cancelado'}[st]||st;
    const type = c.type||'single';
    const typeLblMap = {single:'Único', experiment:'Experimento', recurring:'Recorrente'};
    const typeCol  = {single:'var(--blue)', experiment:'var(--purple)', recurring:'#16A34A'};
    const typeBg   = {single:'var(--blue-lt)', experiment:'rgba(124,58,237,.08)', recurring:'rgba(22,163,74,.08)'};
    const tagsHtml = (c.tags||[]).length ? (c.tags||[]).map(t=>`<span style="display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(200,16,46,.08);color:var(--red);letter-spacing:.3px;white-space:nowrap">${t}</span>`).join(' ') : '<span style="color:var(--muted);font-size:12px">—</span>';
    const fire = st==='rascunho'||st==='programado' ? `<button class="btn btn-primary btn-sm" onclick="fireCamp(${c._idx})" style="font-size:11px;padding:4px 10px">Disparar</button>` : '';
    return `<tr class="camp-tbl-row" onmouseenter="this.style.background='rgba(255,255,255,.03)'" onmouseleave="this.style.background=''" style="border-bottom:1px solid var(--border);cursor:default;transition:background .1s">
      <td style="padding:12px 14px;white-space:nowrap">
        <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text)">
          <span style="width:8px;height:8px;border-radius:50%;background:${dot};flex-shrink:0;box-shadow:0 0 0 2px ${dot}22"></span>
          ${stLbl}
        </span>
      </td>
      <td style="padding:12px 14px;max-width:240px">
        <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${c.name}">${c.name}</div>
        ${c.subject?`<div style="font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${c.subject}">${c.subject}</div>`:''}
      </td>
      <td style="padding:12px 14px;white-space:nowrap">
        <span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:${typeBg[type]};color:${typeCol[type]}">${typeLblMap[type]||type}</span>
      </td>
      <td style="padding:12px 14px;font-size:12px;color:var(--muted);white-space:nowrap">${fdate(c.createdAt)}</td>
      <td style="padding:12px 14px;font-size:12px;color:var(--muted);white-space:nowrap">${c.sentAt||c.sendDate?fdate(c.sentAt||c.sendDate):'<span style="color:var(--muted)">—</span>'}</td>
      <td style="padding:12px 14px">${tagsHtml}</td>
      <td style="padding:12px 14px;white-space:nowrap">
        <div style="display:flex;align-items:center;gap:6px">
          ${fire}
          <button onclick="deleteCamp(${c._idx})" title="Remover" style="width:28px;height:28px;border:1.5px solid var(--border);border-radius:7px;background:none;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .13s" onmouseenter="this.style.borderColor='#EF4444';this.style.color='#EF4444'" onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">✕</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  return filterBar + `<div style="border:1.5px solid var(--border);border-radius:12px;overflow:hidden">
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr style="background:rgba(255,255,255,.03);border-bottom:1.5px solid var(--border)">
          <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;white-space:nowrap">STATUS</th>
          <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px">NOME</th>
          <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;white-space:nowrap">TIPO</th>
          <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;white-space:nowrap">CRIADO EM</th>
          <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;white-space:nowrap">DATA DE ENVIO</th>
          <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px">TAGS</th>
          <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px">AÇÕES</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function _campStatus(c) {
  if (c.status==='enviada'||c.status==='completo') return 'completo';
  if (c.status==='cancelado') return 'cancelado';
  if (c.status==='programado'||c.sendDate) return 'programado';
  return 'rascunho';
}

async function renderEmailAnalytics() {
  const el = document.getElementById('email-tab-content');
  el.innerHTML = loader();
  let notifs = [], phData = null;
  try { const r = await api.get('/v1/notifications?limit=200&page=0'); notifs = (r.data||[]).filter(n=>n.channel==='email'); } catch(e) {}

  const total = notifs.length;
  const delivered = notifs.filter(n=>n.status==='completed'||n.status==='sent').length;
  const failed = notifs.filter(n=>n.status==='failed').length;
  const delivRate = total ? Math.round(delivered/total*100) : 0;

  // Try PostHog for opens/clicks
  let opens = 0, clicks = 0, phNote = '';
  if (CFG.phApiKey && CFG.phProjectId) {
    try {
      const [oRes, cRes] = await Promise.allSettled([
        queryPostHogAudience('notification_opened', 30, ''),
        queryPostHogAudience('notification_clicked', 30, '')
      ]);
      if (oRes.status==='fulfilled') opens = oRes.value.length;
      if (cRes.status==='fulfilled') clicks = cRes.value.length;
    } catch(e) {}
    const openRate = delivered ? Math.round(opens/delivered*100) : 0;
    const clickRate = opens ? Math.round(clicks/opens*100) : 0;
    phNote = `<div style="font-size:11px;color:var(--muted);margin-top:4px">Últimos 30 dias · via PostHog</div>`;
    const phCards = `
      <div class="stat-card"><div class="slbl">Taxa de abertura</div><div class="sval c-blue">${openRate}%</div><div class="ssub">${opens.toLocaleString('pt-BR')} únicos abriram</div></div>
      <div class="stat-card"><div class="slbl">Taxa de clique</div><div class="sval c-green">${clickRate}%</div><div class="ssub">${clicks.toLocaleString('pt-BR')} únicos clicaram</div></div>`;
    el.innerHTML = buildEmailAnalyticsHtml(total, delivered, failed, delivRate, phCards, phNote, notifs);
  } else {
    phNote = `<div style="padding:10px 14px;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.2);border-radius:10px;font-size:12px;color:#7C3AED;margin-bottom:16px">
      <strong>Configure PostHog Personal API Key</strong> nas Configurações para ver taxas de abertura e clique em tempo real.
    </div>`;
    const phCards = `
      <div class="stat-card"><div class="slbl">Taxa de abertura</div><div class="sval" style="color:var(--muted);font-size:22px">—</div><div class="ssub">Requer PostHog API Key</div></div>
      <div class="stat-card"><div class="slbl">Taxa de clique</div><div class="sval" style="color:var(--muted);font-size:22px">—</div><div class="ssub">Requer PostHog API Key</div></div>`;
    el.innerHTML = buildEmailAnalyticsHtml(total, delivered, failed, delivRate, phCards, phNote, notifs);
  }
}

function buildEmailAnalyticsHtml(total, delivered, failed, delivRate, phCards, phNote, notifs) {
  const recentRows = notifs.slice(0,10).map(n=>`<tr>
    <td>${n.subscriber?.email||n.subscriber?.subscriberId||'—'}</td>
    <td>${n.template?.name||n._template?.name||'—'}</td>
    <td>${statusTag(n.status)}</td>
    <td class="text-muted text-sm">${fdate(n.createdAt)}</td>
  </tr>`).join('');
  return `
    ${phNote}
    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card"><div class="slbl">Total enviados</div><div class="sval c-blue">${total.toLocaleString('pt-BR')}</div><div class="ssub">emails disparados</div></div>
      <div class="stat-card"><div class="slbl">Entregues</div><div class="sval c-green">${delivered.toLocaleString('pt-BR')}</div><div class="ssub">${delivRate}% taxa de entrega</div></div>
      ${phCards}
    </div>
    ${failed ? `<div style="padding:8px 14px;background:var(--red-lt);border:1px solid var(--red-bd);border-radius:8px;font-size:12px;color:var(--red);margin-bottom:14px">${failed} emails falharam na entrega.</div>` : ''}
    ${recentRows ? `<div class="card"><div class="card-header"><h3>Últimos envios de email</h3></div><div class="tbl-wrap"><table><thead><tr><th>Subscriber</th><th>Campanha/Workflow</th><th>Status</th><th>Data</th></tr></thead><tbody>${recentRows}</tbody></table></div></div>` : ''}`;
}

let _editTplIdx = -1;
function openEditTemplate(idx) {
  _editTplIdx = idx;
  const t = getTemplates()[idx];
  if (!t) return;
  openModal('Editar Template',`
    <div class="form-group"><label>Nome <span style="color:var(--red)">*</span></label><input class="form-control" id="tpl-name" value="${t.name}"></div>

      <div id="tpl-preview" style="display:none"><div class="camp-preview"><div class="camp-preview-hd">📧 Pré-visualização</div><div class="camp-preview-body" id="tpl-preview-body"></div></div></div>
    </div>

    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="doSaveTemplate(true)">Salvar</button>`,

function previewTpl() {
  const el = document.getElementById('tpl-preview');
  if (el.style.display==='none') {
    document.getElementById('tpl-preview-body').innerHTML = document.getElementById('tpl-body')?.value || '';
    el.style.display = '';
  } else { el.style.display = 'none'; }
}

function doSaveTemplate(edit) {
  const name = document.getElementById('tpl-name')?.value?.trim();
  if (!name) { toast('Nome é obrigatório','err'); return; }
  const tpl = {
    name,
    subject: document.getElementById('tpl-subj')?.value?.trim()||'',
    body: document.getElementById('tpl-body')?.value||'',
    tags: document.getElementById('tpl-tags')?.value?.split(',').map(t=>t.trim()).filter(Boolean)||[],
    createdAt: edit ? getTemplates()[_editTplIdx]?.createdAt : new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
  const tpls = getTemplates();
  if (edit && _editTplIdx >= 0) tpls[_editTplIdx] = tpl; else tpls.push(tpl);
  saveTemplates(tpls);
  toast(edit ? 'Template atualizado!' : 'Template salvo!','ok');
  closeModal(); renderEmailTemplates();
}

function deleteTpl(idx) {
  const tpls = getTemplates();
  if (!confirm(`Remover template "${tpls[idx]?.name}"?`)) return;
  tpls.splice(idx,1); saveTemplates(tpls);
  toast('Template removido','ok'); renderEmailTemplates();
}

async function useTplInCampaign(idx) {
  const tpl = getTemplates()[idx];
  if (!tpl) return;
  toast('Carregando workflows e segmentos...','info');
  let workflows=[],segments=[];
  try{const r=await api.get('/v2/workflows?limit=50&status[]=ACTIVE&status[]=INACTIVE').catch(()=>api.get('/v1/workflows?limit=50'));workflows=r.data?.workflows||r.workflows||r.data||[];}catch(e){}
  try{const r=await api.get('/v1/topics?page=0&pageSize=50');segments=r.data||[];}catch(e){}
  _cd = { step:1, channel:'email', subject:tpl.subject, body:tpl.body, workflows, segments };
  campStep2(); // skip step1 - go directly to audience+content with template pre-filled
}

function inappPreview() {
  const g = id => document.getElementById(id)?.value || '';
  const set = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
  set('prev-tag',     g('ia-tag'));
  set('prev-produto', g('ia-produto'));
  set('prev-titulo',  g('ia-titulo').substring(0, 20) + (g('ia-titulo').length > 20 ? '…' : ''));
  set('prev-corpo',   g('ia-corpo').substring(0, 50)  + (g('ia-corpo').length  > 50 ? '…' : ''));
  set('prev-cta',     g('ia-cta').substring(0, 22)    + (g('ia-cta').length    > 22 ? '…' : ''));
  set('prev-dismiss', g('ia-dismiss').substring(0, 18));
}

async function dispararInApp() {
  const g = id => document.getElementById(id)?.value?.trim() || '';
  const btn = document.getElementById('ia-btn');
  const log = document.getElementById('ia-log');

  const subscriberId = g('ia-sub') || 'simulador-davi';
  const payload = {
    titulo:       g('ia-titulo'),
    corpo:        g('ia-corpo'),
    tag:          g('ia-tag'),
    produto:      g('ia-produto'),
    ctaLabel:     g('ia-cta'),
    dismissLabel: g('ia-dismiss'),
    template:     'inapp',
  };

  btn.disabled = true;
  btn.textContent = 'Disparando…';
  log.textContent = '';
  log.style.color = 'var(--muted)';

  try {
    const res = await api.post('/v1/events/trigger', {
      name: 'inapp-simulador-v2',
      to:   { subscriberId },
      payload,
    });
    if (res?.data?.acknowledged) {
      log.textContent = '✓ Disparado — modal abre em até 3s no app';
      log.style.color = 'var(--green)';
    } else {
      log.textContent = '⚠ Resposta inesperada do Novu';
      log.style.color = 'var(--yellow)';
    }
  } catch(e) {
    log.textContent = '✗ Erro: ' + (e.message || 'verifique o Novu');
    log.style.color = 'var(--red)';
  } finally {
    btn.disabled = false;
    btn.textContent = '▶\u00a0 Disparar In-App';
    setTimeout(() => { log.textContent = ''; }, 5000);
  }
}

async function renderCampaigns(channelFilter) {
  const chInfo = _chDef[channelFilter];
  const newLabel = chInfo ? `Nova campanha de ${chInfo.label}` : 'Nova Campanha';
  document.getElementById('page-actions').innerHTML=`<button class="btn btn-primary" onclick="openNewCamp(${channelFilter?`'${channelFilter}'`:''})">${newLabel}</button>`;

  const el=document.getElementById('content');
  let camps=getCamps();

  if(channelFilter==='whatsapp'){
    el.innerHTML=`
      <div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:14px;padding:18px 22px;margin-bottom:20px;display:flex;align-items:flex-start;gap:14px">
        <div style="width:40px;height:40px;border-radius:11px;background:rgba(34,197,94,.12);color:#16A34A;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M5.5 5.5c0 3.5 5 6 5 6s-1.5-6-5-6z" fill="currentColor" opacity=".5"/></svg>
        </div>
        <div><div style="font-size:13px;font-weight:700;color:#16A34A;margin-bottom:3px">WhatsApp — ferramenta própria Brasil Paralelo</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.6">Os envios de WhatsApp são gerenciados pela ferramenta interna da BP. Aqui você pode registrar campanhas para manter histórico unificado.</div></div>
      </div>`;
    camps=camps.filter(c=>c.channel==='whatsapp');
    if(!camps.length){el.innerHTML+=emptyState(`<svg class="empty-ico" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="22" r="16" stroke="currentColor" stroke-width="2"/><path d="M14 14c0 8 16 14 16 14s-6-16-16-14z" fill="currentColor" opacity=".2"/></svg>`,'Nenhum envio de WhatsApp registrado','Registre campanhas de WhatsApp para ter um histórico unificado.');return;}
  } else if(channelFilter){
    camps=camps.filter(c=>{
      if(channelFilter==='email') return c.channel==='email'||c.channel==='both';
      if(channelFilter==='push-app'||channelFilter==='push-web') return c.channel==='push'||c.channel==='both'||c.channel===channelFilter;
      return c.channel===channelFilter;
    });
    if(!camps.length){el.innerHTML=emptyState(`<svg class="empty-ico" viewBox="0 0 44 44" fill="none"><rect x="6" y="10" width="32" height="24" rx="4" stroke="currentColor" stroke-width="2"/><path d="M6 14l16 10 16-10" stroke="currentColor" stroke-width="2"/></svg>`,`Nenhuma campanha de ${chInfo?.label||channelFilter}`,`Clique em "${newLabel}" para criar a primeira.`);return;}
  } else if(!camps.length){
    el.innerHTML=emptyState(`<svg class="empty-ico" viewBox="0 0 44 44" fill="none"><rect x="6" y="10" width="32" height="24" rx="4" stroke="currentColor" stroke-width="2"/><path d="M6 14l16 10 16-10" stroke="currentColor" stroke-width="2"/></svg>`,'Nenhuma campanha','Crie sua primeira campanha para disparar para um segmento.');return;
  }

  const allCamps=getCamps();
  const cards=camps.slice().reverse().map(c=>{
    const idx=allCamps.findIndex(x=>x.createdAt===c.createdAt&&x.name===c.name);
    const def=_chDef[c.channel]||_chDef.email;
    const st=c.status==='enviada'?'<span class="tag tg-green">Enviada</span>':'<span class="tag tg-gray">Rascunho</span>';
    const fire=c.status!=='enviada'?`<button class="btn btn-primary btn-sm" onclick="fireCamp(${idx})">🚀 Disparar</button>`:'';
    return `<div class="camp-card">
      <div class="camp-icon" style="background:${def.bg};color:${def.col}">${def.ico}</div>
      <div class="camp-info"><div class="camp-name">${c.name}</div><div class="camp-meta">Segmento: <strong>${c.segName||c.segKey||'—'}</strong> · Workflow: <strong>${c.workflow||'—'}</strong> · ${fdate(c.createdAt)}</div></div>
      ${st}<div class="camp-actions">${fire}<button class="btn btn-ghost btn-sm" onclick="deleteCamp(${idx})" title="Remover">✕</button></div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="camp-list">${cards}</div>`;
}

let _cd={};
async function fetchPHCohorts(){
  if(!CFG.phApiKey||!CFG.phProjectId)return[];
  try{
    const r=await fetch(`${CFG.phHost}/api/projects/${CFG.phProjectId}/cohorts/?limit=100`,{headers:{'Authorization':`Bearer ${CFG.phApiKey}`}});
    const d=await r.json();return(d.results||[]).map(c=>({key:'ph_'+c.id,id:c.id,name:c.name,count:c.count||0,type:'posthog'}));
  }catch(e){return[];}
}
async function openNewCamp(preChannel){
  _cd={step:1,channel:preChannel||'email',includeKeys:[],excludeKeys:[],exclTags:''};
  toast('Carregando...','info');
  let workflows=[],segments=[],phCohorts=[];
  try{const r=await api.get('/v2/workflows?limit=50&status[]=ACTIVE&status[]=INACTIVE').catch(()=>api.get('/v1/workflows?limit=50'));workflows=r.data?.workflows||r.workflows||r.data||[];}catch(e){}
  try{const r=await api.get('/v1/topics?page=0&pageSize=50');segments=(r.data||[]).map(s=>({...s,key:s.key,name:s.name,type:'novu'}));}catch(e){}
  phCohorts=await fetchPHCohorts();
  _cd.workflows=workflows;_cd.segments=segments;_cd.phCohorts=phCohorts;campStep1();
}

function _buildRecipList(listId, excludeMode){
  const allLists=[
    ..._cd.segments.map(s=>({key:s.key,name:s.name,count:s._count||0,type:'novu'})),
    ..._cd.phCohorts.map(c=>({key:c.key,id:c.id,name:c.name,count:c.count||0,type:'posthog'}))
  ];
  if(!allLists.length)return`<div style="padding:14px 12px;font-size:12px;color:var(--muted);text-align:center">Nenhum segmento disponível</div>`;
  const checked=excludeMode?(_cd.excludeKeys||[]):(_cd.includeKeys||[]);
  return allLists.map(l=>{
    const badge=l.type==='posthog'
      ?`<span class="ri-badge" style="background:rgba(124,58,237,.1);color:var(--purple)">PostHog</span>`
      :`<span class="ri-badge" style="background:var(--blue-lt);color:var(--blue)">Novu</span>`;
    const cnt=l.count?`<span style="margin-left:auto;font-size:11px;font-weight:700;color:var(--muted)">${l.count.toLocaleString('pt-BR')}</span>`:'';
    return`<label class="recip-item">
      <input type="checkbox" value="${l.key}" data-type="${l.type}" data-count="${l.count}" ${checked.includes(l.key)?'checked':''} onchange="recipToggle('${listId}','${l.key}',this.checked)">
      <div style="flex:1;min-width:0"><div class="ri-name">${l.name}</div><div class="ri-sub">${l.type==='posthog'?'Cohort PostHog':'Segmento Novu'}</div></div>
      ${badge}${cnt}
    </label>`;
  }).join('');
}

function recipToggle(listId, key, checked){
  const field=listId==='excl-list'?'excludeKeys':'includeKeys';
  if(!_cd[field])_cd[field]=[];
  if(checked){if(!_cd[field].includes(key))_cd[field].push(key);}
  else{_cd[field]=_cd[field].filter(k=>k!==key);}
}

  if(detail)detail.innerHTML='<span style="color:var(--muted)">Calculando...</span>';
  const inclKeys=_cd.includeKeys||[];
  const exclKeys=_cd.excludeKeys||[];
  let total=0,lines=[];
  const allLists=[
    ..._cd.segments.map(s=>({key:s.key,name:s.name,type:'novu'})),
    ..._cd.phCohorts.map(c=>({key:c.key,id:c.id,name:c.name,count:c.count||0,type:'posthog'}))
  ];
  const toCount=inclKeys.length?allLists.filter(l=>inclKeys.includes(l.key)):allLists;
  for(const l of toCount){
    let n=0;
    if(l.type==='posthog'){n=_cd.phCohorts.find(c=>c.key===l.key)?.count||0;}
    else{try{const r=await api.get(`/v1/topics/${l.key}/subscribers?limit=1`);n=r.totalCount??r.data?.length??0;}catch(e){}}
    total+=n;
    lines.push(`<span style="color:var(--text)">${l.name}:</span> ${n.toLocaleString('pt-BR')}`);
  }
  if(exclKeys.length){
    for(const l of allLists.filter(l=>exclKeys.includes(l.key))){
      let n=0;
      if(l.type==='posthog'){n=_cd.phCohorts.find(c=>c.key===l.key)?.count||0;}
      else{try{const r=await api.get(`/v1/topics/${l.key}/subscribers?limit=1`);n=r.totalCount??r.data?.length??0;}catch(e){}}
      total=Math.max(0,total-n);
      lines.push(`<span style="color:#ef4444">- ${l.name}:</span> ${n.toLocaleString('pt-BR')}`);
    }
  }
  _cd._audTotal=total;
  const pct=total>0?Math.min(100,total/Math.max(total,1)*100):0;
  const arc=document.getElementById('gauge-arc');
  if(arc)arc.setAttribute('stroke-dashoffset',String(144.51*(1-pct/100)));
  const gc=document.getElementById('gauge-count');
  if(gc)gc.textContent=total.toLocaleString('pt-BR');
  if(detail)detail.innerHTML=lines.join('<br>');
  if(btn)btn.disabled=false;
}

function saveDraft(){

}
async function doFireNew(){
  _collectStep3();
  if(!_cd.segKey){toast('Selecione um segmento Novu para o disparo','err');return;}
  const isScheduled=!!_cd.sendDate;
  const c=getCamps();
  c.push({..._cd,status:isScheduled?'programada':'enviada',createdAt:new Date().toISOString(),sentAt:isScheduled?'':new Date().toISOString()});
  saveCamps(c);closeModal();
  if(!isScheduled)await dispatchCamp({..._cd});
  else toast(`Campanha agendada para ${new Date(_cd.sendDate).toLocaleString('pt-BR')}`,'ok');
  renderEmailCampaignsTab();
}
async function fireCamp(idx){const camps=getCamps(),c=camps[idx];if(!c)return;if(!confirm(`Disparar "${c.name}" para o segmento "${c.segName||c.segKey}"?`))return;camps[idx].status='enviada';camps[idx].sentAt=new Date().toISOString();saveCamps(camps);await dispatchCamp(c);renderCampaigns();}
async function dispatchCamp(c){
  toast('Disparando campanha...','info');
  const supp=getSupp().map(s=>s.email);
  try{
    await api.post('/v1/events/trigger',{name:c.workflow,to:{type:'Topic',topicKey:c.segKey},payload:{subject:c.subject||'',body:c.body||''}});
    toast(`Campanha "${c.name}" disparada!`,'ok');
    phCapture('campaign_sent',{campaign_name:c.name,workflow:c.workflow,segment:c.segKey,channel:c.channel||'email'});
  }catch(e){
    try{
      const subs=(await api.get('/v1/subscribers?limit=200&page=0')).data||[];
      const eligible=subs.filter(s=>!supp.includes(s.email));
      let sent=0;
      for(const s of eligible){try{await api.post('/v1/events/trigger',{name:c.workflow,to:{subscriberId:s.subscriberId},payload:{subject:c.subject||'',body:c.body||'',firstName:s.firstName||''}});sent++;}catch(e2){}}
      toast(`Campanha disparada para ${sent} subscriber(s)!`,'ok');
      phCapture('campaign_sent',{campaign_name:c.name,workflow:c.workflow,segment:c.segKey,channel:c.channel||'email',recipients:sent});
    }catch(e3){toast('Erro ao disparar: '+e3.message,'err');}
  }
}
function deleteCamp(idx){const c=getCamps();if(!confirm(`Remover "${c[idx]?.name}"?`))return;c.splice(idx,1);saveCamps(c);renderCampaigns();}

function setFeedFilter(f){_feedFilter=f;renderFeed();}
async function loadFeed(){
  const el=document.getElementById('feed-card');if(!el)return;
  try{
    const r=await api.get('/v1/notifications?limit=60&page=0');
    let items=r.data||[];
    if(_feedFilter==='email')items=items.filter(n=>n.channel==='email');
    if(_feedFilter==='push')items=items.filter(n=>n.channel==='push');
    if(_feedFilter==='failed')items=items.filter(n=>n.status==='failed');
    const ts=document.getElementById('feed-ts');if(ts)ts.textContent=`Atualizado às ${new Date().toLocaleTimeString('pt-BR')}`;
    if(!items.length){el.innerHTML=emptyState(`<svg class="empty-ico" viewBox="0 0 44 44" fill="none"><path d="M9 16V10a13 13 0 0126 0v6l3.5 5H5.5L9 16z" stroke="currentColor" stroke-width="2"/><path d="M17 34a5 5 0 0010 0" stroke="currentColor" stroke-width="2"/></svg>`,'Nenhum registro','Dispare uma campanha para ver a atividade aqui.');return;}
    const rows=items.map(n=>`<tr><td>${n.subscriber?.email||n.subscriber?.subscriberId||'—'}</td><td>${chTag(n.channel)}</td><td>${n.template?.name||n._template?.name||'—'}</td><td>${statusTag(n.status)}</td><td class="text-muted text-sm">${fdate(n.createdAt)}</td></tr>`).join('');
    el.innerHTML=`<div class="tbl-wrap"><table><thead><tr><th>Subscriber</th><th>Canal</th><th>Workflow</th><th>Status</th><th>Data</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }catch(e){el.innerHTML=apiErr();}
}

function getUnsubs(){return JSON.parse(localStorage.getItem('crm-unsubs')||'[]');}
